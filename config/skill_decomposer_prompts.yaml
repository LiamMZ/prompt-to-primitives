template: |
  You are a robot task planner. Convert the action below into an ordered sequence of
  Atomic Manipulation Primitive (AMP) calls using ONLY the primitives in the catalog.
  An RGB snapshot (when available) is attached — use it for visual context.

  Primitive catalog:
  {primitive_catalog}

  Action:
  - name: {action_name}
  - pddl_parameters: {action_parameters}
  - runtime_arguments: {parameters}
  - description: {action_description}

  {role_assignments}

  World state:
  {object_section}
  Snapshot id: {last_snapshot_id}
  Perception: {perception_context}

  Rules:

  1. Use ONLY primitive names from the catalog. Any other name causes a hard failure.

  2. move_gripper_to_pose — pointing_guidance (required):
     Set `metadata.pointing_guidance` to a "Point to …" instruction that is sent
     verbatim to Molmo2. Molmo clicks that sub-region, so be geometrically specific.
     Always begin with "Point to" and describe the exact contact region:
     - pick / displace:  "Point to the cylindrical body of the red cup midway between base and rim"
     - place:            "Point to the flat table surface 10 cm left of the blue cup"
     - open/close:       "Point to the drawer handle grip bar at its midpoint"
     Do NOT set target_pixel_yx or preset_orientation — the executor resolves those.
     Set `metadata.approach_direction`: "top_down" for open surfaces and flat tops;
     "side" for handles, knobs, vertical faces, or overhead-obstructed items.
     Set `is_place: true` in parameters when placing.

  3. push_pull — surface grounding (Molmo-driven):
     `surface_label` is required (use the target object_id). The executor queries
     Molmo to find the contact surface and computes the surface normal automatically —
     do NOT specify target positions or normals.
     Set `action_goal` to the high-level goal string when it improves prompt clarity
     (e.g. "open", "close", "press", "slide") — this is passed to Molmo's pointing prompt.
     Set `has_pivot: true` for revolute joints — Molmo locates the hinge automatically.
     Set `is_button: true` for momentary press-and-retract.

  4. move_gripper_to_pose ONLY moves the arm — it does NOT open or close the gripper.
     Always pair it with explicit open_gripper / close_gripper calls:
       pick sequence:   open_gripper → move_gripper_to_pose (to object) → close_gripper → retract_gripper
       place sequence:  move_gripper_to_pose (to target, is_place=true) → open_gripper → retract_gripper
     Never rely on move_gripper_to_pose to actuate the gripper.

  5. Gripper and motion primitives — pass `{}` for parameters unless overriding defaults:
     open_gripper, close_gripper, retract_gripper, twist.
     For twist, set turn_amount to one of: quarter_turn (90°), half_turn (180°),
     three_quarter_turn (270°), full_turn (360°). Default is full_turn.

  6. Set `references.object_id` to the target object_id for any primitive acting on an object.

  7. Parameter ownership — each parameter belongs to EXACTLY ONE primitive.
     NEVER cross-contaminate:
       move_gripper_to_pose  → point_label, is_place
       push_pull             → surface_label, force_direction, is_button, has_pivot,
                               action_goal
       open_gripper          → wait, timeout
       close_gripper         → wait, timeout, simple_close
       retract_gripper       → distance, speed_factor
       twist                 → direction, turn_amount, speed_factor, timeout
     The executor validates every param name against the schema and rejects unknowns.

  8. If perception data is >90 s old, note it in `diagnostics.freshness_notes`.

response_schema:
  type: object
  required: ["primitives", "diagnostics"]
  properties:
    primitives:
      type: array
      description: Ordered primitive calls. Each name must be from the catalog.
      items:
        type: object
        required: ["name", "parameters", "references", "metadata"]
        properties:
          name:
            type: string
            enum:
              - move_gripper_to_pose
              - push_pull
              - open_gripper
              - close_gripper
              - retract_gripper
              - twist
          parameters:
            type: object
            additionalProperties: true
            properties:
              point_label:
                type: string
                description: "move_gripper_to_pose only. Target object_id."
              is_place:
                type: boolean
                description: "move_gripper_to_pose only. True when placing."
              surface_label:
                type: string
                description: "push_pull only (required). Object ID or surface label."
              force_direction:
                type: string
                enum: ["perpendicular", "parallel"]
                description: "push_pull only."
              is_button:
                type: boolean
                description: "push_pull only. Momentary press then retract."
              has_pivot:
                type: boolean
                description: "push_pull only. Revolute articulation (door/drawer)."
              action_goal:
                type: string
                description: "push_pull only. High-level goal (e.g. 'open', 'close', 'press')."
              wait:
                type: boolean
                description: "open_gripper / close_gripper only."
              timeout:
                type: number
                description: "open_gripper / close_gripper only."
              simple_close:
                type: boolean
                description: "close_gripper only."
              distance:
                type: number
                description: "retract_gripper only."
              speed_factor:
                type: number
                description: "retract_gripper / twist only."
              direction:
                type: string
                enum: ["clockwise", "counterclockwise"]
                description: "twist only."
              turn_amount:
                type: string
                enum: ["quarter_turn", "half_turn", "three_quarter_turn", "full_turn"]
                description: "twist only. quarter_turn=90°, half_turn=180°, three_quarter_turn=270°, full_turn=360°."
          references:
            type: object
            additionalProperties: false
            properties:
              object_id:
                type: string
                description: Target object ID for this step.
          metadata:
            type: object
            additionalProperties: true
            properties:
              pointing_guidance:
                type: string
                description: >
                  A "Point to …" instruction sent verbatim to Molmo2 for move_gripper_to_pose.
                  Must begin with "Point to" and describe contact geometry in detail —
                  not the action intent (e.g. "Point to the cylindrical body just below
                  the rim of the red cup", not "pick up the cup").
              approach_direction:
                type: string
                enum: ["top_down", "side"]
                description: >
                  Preferred gripper approach direction for move_gripper_to_pose.
                  Executor validates against clearance corridors and falls back
                  if the preferred direction is blocked.
    assumptions:
      type: array
      items:
        type: string
    diagnostics:
      type: object
      required: ["rationale"]
      properties:
        rationale:
          type: string
        freshness_notes:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
