template: |
  You are a robot task planner. Convert the action below into an ordered sequence of
  Atomic Manipulation Primitive (AMP) calls using ONLY the primitives in the catalog.
  An RGB snapshot (when available) is attached — use it for visual context.

  Primitive catalog:
  {primitive_catalog}

  Action:
  - name: {action_name}
  - high_level_action: {high_level_action}
  - target_object_id: {target_object_id}
  - pddl_parameters: {action_parameters}
  - runtime_arguments: {parameters}
  - description: {action_description}

  {role_assignments}

  World state:
  {object_section}
  Snapshot id: {last_snapshot_id}
  Perception: {perception_context}

  Rules:

  1. Use ONLY primitive names from the catalog. Any other name causes a hard failure.

  2. move_gripper_to_pose — pointing_guidance (required):
     Set `metadata.pointing_guidance` to a "Point to …" instruction sent verbatim to
     Molmo2. The instruction must combine TWO things: (a) the best grasp surface on the
     object, and (b) the action being performed. This lets Molmo choose the right contact
     point for the specific goal, not just the nearest surface.

     Template: "Point to the best place to <action verb> the <object_type> to <complete the goal>."

     The point MUST land on the physical surface of the target object — never in the air,
     behind it, or on a neighbouring object. Do NOT describe where the object is in the
     scene — describe the intended interaction with the object itself.

     Do NOT set target_pixel_yx or preset_orientation — the executor resolves those.
     Set `metadata.approach_direction`: "top_down" for open surfaces and flat tops;
     "side" for handles, knobs, vertical faces, or overhead-obstructed items.
     Set `is_place: true` in parameters when placing.

  3. push and pull — surface grounding (Molmo-driven):
     `surface_label` is required for both (use the target object_id).
     The executor queries Molmo to find the contact point and computes the surface
     normal automatically — do NOT specify directions or normals yourself.
     Set `action_goal` to clarify intent for Molmo (e.g. "press", "push", "open", "pull").

     push: moves the gripper ALONG -normal (into the surface).
       Use for: pressing actuatable surfaces, pushing objects, closing articulated parts.
       Set `is_button: true` for momentary press-and-retract.

     pull: moves the gripper ALONG +normal (away from the surface).
       Use for: pulling handles, extracting objects, opening articulated parts.
       Set `has_pivot: true` ONLY when the object physically rotates around a fixed
       hinge axis. DO NOT set has_pivot for any motion where the object translates
       rather than rotates. For all linear pulls, leave has_pivot null.
       Set `hinge_axis: "vertical"` when the hinge is on a vertical edge (object swings
       left/right). Set `hinge_axis: "horizontal"` when the hinge is on a horizontal
       edge (object swings up/down). Null if unknown or if has_pivot is null.

  4. move_gripper_to_pose ONLY moves the arm — it does NOT open or close the gripper.
     Always pair it with explicit open_gripper / close_gripper calls:
       grasp sequence:        open_gripper → move_gripper_to_pose → close_gripper → retract_gripper
       place sequence:        move_gripper_to_pose (is_place=true) → open_gripper → retract_gripper
       pull with grasp:       open_gripper → move_gripper_to_pose → close_gripper → pull → open_gripper → retract_gripper
       push without grasp:    move_gripper_to_pose → push
     Never rely on move_gripper_to_pose to actuate the gripper.

     ⚠ PLACE SAFETY — open_gripper MUST come AFTER move_gripper_to_pose (is_place=true),
     never before. The gripper must be physically positioned at the destination surface
     before the object is released. Opening the gripper mid-air or during transit drops
     the object from height and may break it. The correct invariant is:
       1. Gripper arrives at destination (move_gripper_to_pose with is_place=true)
       2. Gripper opens and object is set down (open_gripper)
       3. Gripper retracts empty (retract_gripper)
     Inserting open_gripper at any earlier point in this sequence is an error.

     Any task that requires PULLING MUST include close_gripper before pull so the robot
     is gripping the object. Forgetting close_gripper means the robot will swipe through
     the air and accomplish nothing.

  5. Gripper and motion primitives — pass `{}` for parameters unless overriding defaults:
     open_gripper, close_gripper, retract_gripper, twist.
     For twist, set turn_amount to one of: quarter_turn (90°), half_turn (180°),
     three_quarter_turn (270°), full_turn (360°). Default is full_turn.

  6. Set `references.object_id` to the target object_id for any primitive acting on an object.

  7. Parameter ownership — each parameter belongs to EXACTLY ONE primitive.
     NEVER cross-contaminate:
       move_gripper_to_pose  → point_label, is_place
       push                  → surface_label, is_button, action_goal
       pull                  → surface_label, has_pivot, hinge_axis, action_goal
       open_gripper          → wait, timeout
       close_gripper         → wait, timeout, simple_close
       retract_gripper       → distance, speed_factor
       twist                 → direction, turn_amount, speed_factor, timeout
     The executor validates every param name against the schema and rejects unknowns.

  8. If perception data is >90 s old, note it in `diagnostics.freshness_notes`.

response_schema:
  type: object
  required: ["primitives", "assumptions", "diagnostics"]
  additionalProperties: false
  properties:
    primitives:
      type: array
      description: Ordered primitive calls. Each name must be from the catalog.
      items:
        type: object
        required: ["name", "parameters", "references", "metadata"]
        additionalProperties: false
        properties:
          name:
            type: string
            enum:
              - move_gripper_to_pose
              - push
              - pull
              - open_gripper
              - close_gripper
              - retract_gripper
              - twist
          parameters:
            type: object
            additionalProperties: false
            properties:
              point_label:
                type: ["string", "null"]
                description: "move_gripper_to_pose only. Target object_id."
              is_place:
                type: ["boolean", "null"]
                description: "move_gripper_to_pose only. True when placing."
              surface_label:
                type: ["string", "null"]
                description: "push / pull only (required). Object ID or surface label."
              is_button:
                type: ["boolean", "null"]
                description: "push only. Momentary press then retract."
              has_pivot:
                type: ["boolean", "null"]
                description: "pull only. True ONLY for objects that rotate around a fixed hinge (cabinet doors, hinged lids, oven doors). Null for all linear pulls (caps, dipsticks, plugs, sliding drawers)."
              hinge_axis:
                type: ["string", "null"]
                enum: ["vertical", "horizontal", null]
                description: "pull only (with has_pivot). 'vertical' = side hinge (door swings left/right). 'horizontal' = top/bottom hinge (lid swings up/down). Null if unknown."
              action_goal:
                type: ["string", "null"]
                description: "push / pull only. High-level goal passed to Molmo (e.g. 'press', 'open', 'pull')."
              wait:
                type: ["boolean", "null"]
                description: "open_gripper / close_gripper only."
              timeout:
                type: ["number", "null"]
                description: "open_gripper / close_gripper only."
              simple_close:
                type: ["boolean", "null"]
                description: "close_gripper only."
              distance:
                type: ["number", "null"]
                description: "retract_gripper only."
              speed_factor:
                type: ["number", "null"]
                description: "retract_gripper / twist only."
              direction:
                type: ["string", "null"]
                enum: ["clockwise", "counterclockwise", null]
                description: "twist only."
              turn_amount:
                type: ["string", "null"]
                enum: ["quarter_turn", "half_turn", "three_quarter_turn", "full_turn", null]
                description: "twist only. quarter_turn=90°, half_turn=180°, three_quarter_turn=270°, full_turn=360°."
            required:
              - point_label
              - is_place
              - surface_label
              - is_button
              - has_pivot
              - hinge_axis
              - action_goal
              - wait
              - timeout
              - simple_close
              - distance
              - speed_factor
              - direction
              - turn_amount
          references:
            type: object
            additionalProperties: false
            required: ["object_id"]
            properties:
              object_id:
                type: ["string", "null"]
                description: Target object ID for this step. Null for primitives with no specific target.
          metadata:
            type: object
            additionalProperties: false
            required: ["pointing_guidance", "approach_direction"]
            properties:
              pointing_guidance:
                type: ["string", "null"]
                description: >
                  A "Point to …" instruction sent verbatim to Molmo2 for move_gripper_to_pose.
                  Must use the template: "Point to the best place to <action verb> the
                  <object_type> to <complete the goal>." The point must land on the physical
                  surface of the target object. Never describe scene location — describe the
                  intended interaction with the object. Null for all other primitives.
              approach_direction:
                type: ["string", "null"]
                enum: ["top_down", "side", null]
                description: >
                  Preferred gripper approach direction for move_gripper_to_pose.
                  Executor validates against clearance corridors and falls back
                  if the preferred direction is blocked. Null for other primitives.
    assumptions:
      type: array
      items:
        type: string
    diagnostics:
      type: object
      required: ["rationale", "freshness_notes", "warnings"]
      additionalProperties: false
      properties:
        rationale:
          type: string
        freshness_notes:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
